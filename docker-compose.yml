services:
  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg2://scada:scada@postgres:5432/scada
      SECRET_KEY: dev-secret
      MASTER_KEY: local-master-key
    depends_on:
      - postgres
      - redis
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: scada
      POSTGRES_PASSWORD: scada
      POSTGRES_DB: scada
    ports:
      - "5432:5432"
  redis:
    image: redis:7
    ports:
      - "6379:6379"
